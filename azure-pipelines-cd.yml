stages:

  - stage: Deploy
    displayName: 'Deploy to AKS'
    jobs:
      - job: DeployToAKS
        displayName: 'Apply Kubernetes Manifests'
        steps:
          - checkout: self        ← add this line
          
          - task: KubernetesManifest@1
            displayName: 'Deploy to AKS'
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: 'corvit-aks-connection'
              namespace: 'default'
              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml